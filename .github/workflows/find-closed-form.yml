name: find-closed-form

on:
  push:
    paths:
      - "packages/find-closed-form/**"
      - "packages/algebraic-range/src/**"
      - "packages/transcendental-range/src/**"
      - ".github/workflows/find-closed-form.yml"
  pull_request:
    paths:
      - "packages/find-closed-form/**"
      - "packages/algebraic-range/src/**"
      - "packages/transcendental-range/src/**"
      - ".github/workflows/find-closed-form.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/find-closed-form

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The search-range packages are installed from the local tree until
      # they are published; transcendental-range needs Python >= 3.10.
      - name: Install search-range packages (local)
        run: pip install ../algebraic-range
      - name: Install transcendental-range (local, Python >= 3.10)
        if: matrix.python-version != '3.9'
        run: pip install ../transcendental-range

      - name: Run tests
        run: pytest -v -k "not WolframCrossValidation"
