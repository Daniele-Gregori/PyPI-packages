name: algebraic-range

on:
  push:
    paths:
      - "packages/algebraic-range/**"
      - ".github/workflows/algebraic-range.yml"
  pull_request:
    paths:
      - "packages/algebraic-range/**"
      - ".github/workflows/algebraic-range.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/algebraic-range

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.14"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v -m "not benchmark"
