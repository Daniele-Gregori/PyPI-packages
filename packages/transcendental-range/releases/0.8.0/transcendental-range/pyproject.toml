[build-system]
requires = ["setuptools >= 68.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "transcendental-range"
version = "0.8.0"
description = "Generate transcendental numbers within a range using algebraic generators and transcendental functions."
requires-python = ">= 3.10"
license = "MIT"
authors = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
keywords = ["mathematics", "transcendental", "number-theory", "symbolic", "algebraic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "algebraic-range >= 0.8.0",
    "sympy >= 1.12",
]

[project.optional-dependencies]
dev = ["pytest >= 7.0"]

[tool.setuptools.packages.find]
where = ["src"]
