[build-system]
requires = ["setuptools >= 68.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "transcendental-range"
version = "0.9.0"
description = "Generate ranges of transcendental numbers from algebraic generators and transcendental functions."
readme = "README.md"
requires-python = ">= 3.10"
license = "MIT"
authors = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
maintainers = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
keywords = ["mathematics", "transcendental", "number-theory", "symbolic", "algebraic", "wolfram"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "algebraic-range >= 0.9.0",
    "farey >= 0.7.0",
    "sympy >= 1.12",
    "mpmath >= 1.3",
]

[project.optional-dependencies]
dev = ["pytest >= 7.0"]

[project.urls]
Homepage = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/transcendental-range"
Documentation = "https://resources.wolframcloud.com/FunctionRepository/resources/TranscendentalRange/"
Repository = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/transcendental-range"
Changelog = "https://github.com/Daniele-Gregori/PyPI-packages/blob/main/packages/transcendental-range/CHANGELOG.md"
Issues = "https://github.com/Daniele-Gregori/PyPI-packages/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]
