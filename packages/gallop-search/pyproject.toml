[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gallop-search"
version = "0.8.0"
description = "Binary search from an arbitrary position in sorted sequences"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
maintainers = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
keywords = [
    "search",
    "binary-search",
    "galloping",
    "exponential-search",
    "sorted",
    "algorithm",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/gallop-search"
Repository = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/gallop-search"
Issues = "https://github.com/Daniele-Gregori/PyPI-packages/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
