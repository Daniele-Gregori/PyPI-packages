[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "find-closed-form"
version = "0.0.2"
description = "Find closed-form expressions for numerical values"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
maintainers = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
keywords = [
    "closed-form",
    "symbolic-computation",
    "number-theory",
    "mathematics",
    "inverse-symbolic-calculator",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Education",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "sympy>=1.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/find-closed-form"
Documentation = "https://resources.wolframcloud.com/FunctionRepository/resources/FindClosedForm/"
Repository = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/find-closed-form"
Issues = "https://github.com/Daniele-Gregori/PyPI-packages/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
