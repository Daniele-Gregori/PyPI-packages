[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "farey"
version = "0.7.0"
description = "Generate Farey sequences and Farey ranges"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
maintainers = [
    { name = "Daniele Gregori", email = "dangregori@gmail.com" },
]
keywords = [
    "farey",
    "farey-sequence",
    "farey-range",
    "fractions",
    "number-theory",
    "mathematics",
    "wolfram",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Education",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.urls]
Homepage = "https://resources.wolframcloud.com/PacletRepository/resources/DanieleGregori/GeneralizedRange/"
Repository = "https://github.com/Daniele-Gregori/PyPI-packages/tree/main/packages/farey"
Changelog = "https://github.com/Daniele-Gregori/PyPI-packages/blob/main/packages/farey/CHANGELOG.md"
Issues = "https://github.com/Daniele-Gregori/PyPI-packages/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
